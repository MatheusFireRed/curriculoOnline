<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <style>

        .card{
            width: 100vw;
            background-color: black;

        }

        .card h1{
            color: green;
            transform: translateY(100px);
            opacity: 0;
            transition: .5s ease;
        }

        .card:hover > h1{
            transform: translateY(0);
            opacity: 1;
            transition: .5s ease-in;
        }
    </style>

    <div class="card" id="card">
        <h1>Texto aqui

        </h1>

    </div>

</body>
</html>
